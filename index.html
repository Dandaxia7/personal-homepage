<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页</title>
  </head>
  <body>
    <div id="app">
      <!-- 加载界面 -->
      <div id="loading-screen">
        <div class="loading-content">
          <h1 class="loading-title">加载中...</h1>
          <div class="loading-progress-container">
            <div class="loading-progress-bar"></div>
          </div>
          <div class="loading-percent">0%</div>
          <p class="loading-tip">正在加载 3D 模型，请稍候...</p>
        </div>
      </div>
      
      <!-- 滚动容器 -->
      <div id="scroll-container">
        <!-- 区域1: 3D展示场景 -->
        <section id="scene-section" class="scroll-section" data-section="hero">
          <div id="canvas-container">
            <canvas id="canvas"></canvas>
          </div>
        </section>
        
        <!-- 区域2: 技能展示 -->
        <section id="skills-section" class="scroll-section" data-section="skills">
          <div class="section-backdrop"></div>
          <div class="section-content section-content-wide">
            <h2 class="section-title">技术能力</h2>
            <div class="skills-content"></div>
          </div>
        </section>
        
        <!-- 区域3: 项目展示 -->
        <section id="projects-section" class="scroll-section" data-section="projects">
          <div class="section-backdrop"></div>
          <div class="section-content">
            <h2 class="section-title">项目展示</h2>
            <div class="projects-content">
              <p class="section-placeholder">这里将展示我的项目作品...</p>
            </div>
          </div>
        </section>
        
        <!-- 区域4: 关于我 + 联系方式 -->
        <section id="about-section" class="scroll-section" data-section="about">
          <div class="section-backdrop"></div>
          <div class="section-content">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
              <p class="section-placeholder">欢迎来到我的个人主页！</p>
              <p class="section-placeholder">个人简介与联系方式即将完善...</p>
            </div>
          </div>
        </section>
      </div>

      <!-- 首屏滚动提示（独立于滚动容器，避免被毛玻璃遮挡） -->
      <div id="scroll-hint" class="scroll-hint">
        <span class="scroll-hint-text">向下滚动探索</span>
        <div class="scroll-hint-arrow">
          <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 9 L12 15 L18 9" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
